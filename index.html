<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOCIL | Movimiento de Tierras</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #2c3e50; /* El azul oscuro de la V3 */
            overflow: hidden;
        }

        /* Fondo con superposición (Overlay) */
        .hero-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            /* Imagen de fondo genérica industrial/maquinaria */
            background: linear-gradient(rgba(27, 32, 37, 0.85), rgba(23, 31, 39, 0.85)), 
                        url('/images/Foto_portada0.jpg');
            background-size: cover;
            background-position: center;
        }

        .content {
            z-index: 2;
            padding: 20px;
            animation: fadeIn 1.2s ease-out;
        }

        /* Estilo del Logo/Marca */
        .brand-name {
            color: #ffffff;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .brand-name span {
            color: #F5C200; /* El naranja característico */
        }

        .subtitle {
            color: #bdc3c7;
            font-size: 1.2rem;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* El botón central */
        .btn-enter {
            display: inline-block;
            padding: 18px 45px;
            background-color: #F5C200;
            color: #0A0A0A;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(230, 126, 34, 0.3);
            border: 2px solid transparent;
        }

        .btn-enter:hover {
            background-color: transparent;
            border-color: #F5C200;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px #F5C200;
            color: #ffffff;
        }

        .btn-enter i {
            margin-left: 10px;
        }

        /* Animación suave de entrada */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Decoración de bordes */
        .frame {
            position: absolute;
            top: 20px;
            bottom: 20px;
            left: 20px;
            right: 20px;
            border: 1px solid #F5C200;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <div class="frame"></div>
        
        <div class="content">
            <h1 class="brand-name">ECO<span>CIL</span></h1>
            <p class="subtitle">Desde 1964 · Más de 60 años de experiencia</p>
            
            <a href="landing.html" class="btn-enter">
                INGRESAR AL SITIO <i class="fas fa-chevron-right"></i>
            </a>
        </div>
        
    </div>
    
</body>
</html>
